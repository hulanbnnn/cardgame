<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Тоглоом</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #0f0e17;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 2rem;
    color: #fffffe;
  }
  h1 { font-size: 1.6rem; font-weight: 900; color: #ff8906; margin-bottom: 0.15rem; }
  .subtitle { font-size: 0.8rem; color: #a7a9be; margin-bottom: 1rem; }
  .stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; }
  .stat { text-align: center; }
  .stat-label { font-size: 0.65rem; color: #a7a9be; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 1.4rem; font-weight: 900; color: #fffffe; }
  .stat-value.hl { color: #ff8906; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.2rem;
  }
  .card {
    aspect-ratio: 1;
    cursor: pointer;
    perspective: 600px;
    -webkit-tap-highlight-color: transparent;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    border-radius: 12px;
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
  }
  .card-front {
    background: #1a1a2e;
    border: 2px solid #2e2e4a;
    font-size: 1.4rem; font-weight: 900; color: #3d3d6b;
  }
  .card-back {
    background: #111;
    border: 2px solid #ff8906;
    transform: rotateY(180deg);
    overflow: hidden;
  }
  .card-back img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .card.matched .card-back { border-color: #3fc380; animation: pop 0.35s ease; }
  @keyframes pop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  .btn {
    background: #ff8906; color: #0f0e17;
    border: none; padding: 0.7rem 2rem;
    border-radius: 50px; font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }
  .win-banner {
    display: none; flex-direction: column; align-items: center; gap: 0.4rem;
    background: #1a1a2e; border: 2px solid #ff8906;
    border-radius: 16px; padding: 1rem 1.5rem; margin-bottom: 1rem;
    text-align: center;
  }
  .win-banner.show { display: flex; }
  .win-title { font-size: 1.4rem; font-weight: 900; color: #ff8906; }
  .win-sub { font-size: 0.85rem; color: #a7a9be; }
</style>
</head>

</div>
<div class="win-banner" id="winBanner">

let flipped=[], matched=0, moves=0, lock=false, seconds=0, timerInterval, started=false;
function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }
function startGame(){
  clearInterval(timerInterval);
  flipped=[]; matched=0; moves=0; seconds=0; lock=false; started=false;
  document.getElementById('moves').textContent='0';
  document.getElementById('pairs').textContent='0/8';
  document.getElementById('timer').textContent='0s';
  document.getElementById('winBanner').classList.remove('show');
  const cards = shuffle([...IMAGES.map((s,i)=>({src:s,id:i})), ...IMAGES.map((s,i)=>({src:s,id:i}))]);
  const grid = document.getElementById('grid');
  grid.innerHTML='';
  cards.forEach(({src,id})=>{
    const card = document.createElement('div');
    card.className='card'; card.dataset.id=id;
    card.innerHTML=`<div class="card-inner"><div class="card-front">?</div><div class="card-back"><img src="data:image/jpeg;base64,${src}"></div></div>`;
    card.addEventListener('click',()=>flip(card));
    grid.appendChild(card);
  });
}
function flip(card){
  if(lock||card.classList.contains('flipped')||card.classList.contains('matched')) return;
  if(!started){ started=true; timerInterval=setInterval(()=>{ seconds++; document.getElementById('timer').textContent=seconds+'s'; },1000); }
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    lock=true; moves++;
    document.getElementById('moves').textContent=moves;
    const [a,b]=flipped;
    if(a.dataset.id===b.dataset.id){
      a.classList.add('matched'); b.classList.add('matched');
      matched++; document.getElementById('pairs').textContent=matched+'/8';
      flipped=[]; lock=false;
      if(matched===8){ clearInterval(timerInterval); document.getElementById('winMsg').textContent=moves+' алхамаар, '+seconds+' секундэд дуусгалаа!'; document.getElementById('winBanner').classList.add('show'); }
    } else {
      setTimeout(()=>{ a.classList.remove('flipped'); b.classList.remove('flipped'); flipped=[]; lock=false; },850);
    }
  }
}
startGame();
</script>
